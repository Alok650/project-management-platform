services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pmp_dev
      MYSQL_USER: pmp
      MYSQL_PASSWORD: pmp_pass
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports: ["9324:9324", "9325:9325"]
    volumes: ["./elasticmq.conf:/opt/elasticmq.conf"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9325 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
